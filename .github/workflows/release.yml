# Push a version tag (e.g. v0.1.16) after bumping package.json "version" to match (no "v" prefix).
# Set repository Actions secrets: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (inlined at build time).
# Release body / notes: build.releaseInfo.releaseNotes in package.json (changelog for auto-updater).
name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build app & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned Windows build — skip code-sign discovery so CI doesn’t wait on certs.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Inlined by Vite at build time — add these as repository Actions secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run release
